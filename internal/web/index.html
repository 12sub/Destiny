<!DOCTYPE html>
<html>
<head>
    <title>Destiny Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <h1 class="text-3xl font-bold text-cyan-400 mb-4">Destiny Live Monitor</h1>
    
    <div class="bg-slate-800 p-4 rounded-lg shadow-xl">
        <table class="w-full text-left">
            <thead>
                <tr class="border-b border-slate-700">
                    <th class="p-2">Time</th>
                    <th class="p-2">Proto</th>
                    <th class="p-2">Source</th>
                    <th class="p-2">Info</th>
                </tr>
            </thead>
            <tbody id="packet-table">
                </tbody>
        </table>
    </div>

    <script>
        const ws = new WebSocket("ws://" + window.location.host + "/ws/live");
        const table = document.getElementById('packet-table');

        ws.onmessage = (event) => {
            const p = JSON.parse(event.data);
            const row = `<tr>
                <td class="p-2 text-xs text-slate-400">${p.timestamp}</td>
                <td class="p-2 font-bold text-cyan-300">${p.protocol}</td>
                <td class="p-2">${p.source}</td>
                <td class="p-2 italic text-slate-300">${p.info}</td>
            </tr>`;
            table.insertAdjacentHTML('afterbegin', row);
        };
    </script>
</body>
</html>
